<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Syllabus Parser AI</title>
    <meta name="description" content="Upload your syllabus (PDF or DOCX) and instantly get all deadlines in a downloadable calendar. Free, fast, and simple.">
    <meta name="keywords" content="syllabus parser, syllabus to calendar, assignment tracker, student productivity tool, syllabus deadlines">

    <meta property="og:title" content="Syllabus Parser AI">
    <meta property="og:description" content="Upload your syllabus and instantly get all deadlines in a downloadable calendar. Free and simple.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.syllabusparserai.com">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-397EX4ZLS5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

        gtag('js', new Date());
        gtag('config', 'G-397EX4ZLS5');
    </script>

    <script>
        function trackEvent(eventName, params = {}) {
            if (typeof gtag === "function") { 
                gtag("event", eventName, params);
                console.log("Tracked:", eventName, params);
            }
        }
    </script>

    <style>
        .disclaimer {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 16px;
            margin: 24px 0;
            border-radius: 8px;
            font-size: 14px;
            color: #664d03;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        #downloadBtn:hover {
            background: #28A745;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #1d1d1f;
        }

        input[type="file"] {
            margin: 20px 0;
            font-size: 14px;
        }

        button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: #0051D5;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .event {
            background: #f9f9f9;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border-left: 3px solid #007AFF;
        }

        .event strong {
            color: #1d1d1f;
        }

        #downloadBtn {
            display: none;
            margin-top: 20px;
            background: #34C759;
        }

        #uploadAnotherBtn {
            background: #007AFF;
            margin-top: 20px;
        }

        #downloadBtn:hover {
            background: #28A745;
        }

        h3 {
            margin-top: 30px;
            color: #1d1d1f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Syllabus Parser AI</h1>
        <p>Upload your syllabus (PDF or DOCX) and instantly get all deadlines in a downloadable calendar. Free and simple.</p>

        <input type="file" id="fileInput" accept=".pdf,.docx" multiple>
        <br>
        <button id="analyzeBtn" onclick="analyzeSyllabus()">Analyze Syllabus</button>

        <div id="status"></div>
        <div id="results"></div>
        <button id="downloadBtn" onclick="downloadCalendar()">Download Calendar</button>
        <button id="uploadAnotherBtn" onclick="location.reload()" style="display:none;">Upload Another Syllabus</button>
    </div>

    <script>
        let calendarData = [];

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr + 'T00:00:00'); // Force local timezone
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return date.toLocaleDateString('en-GB', options); // Returns "13 February 2026"
        }

async function analyzeSyllabus() {
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const btn = document.getElementById('analyzeBtn');

    if (!fileInput.files[0]) {
        status.textContent = 'Please select a file first.';
        return;
    }

    btn.disabled = true;
    status.textContent = 'Analyzing... this takes 5-15 seconds.';
    document.getElementById('downloadBtn').style.display = 'none';

    const formData = new FormData();

    for (let i = 0; i < fileInput.files.length; i++) {
        const file = fileInput.files[i];
        const fileType = file.name.split('.').pop().toLowerCase();
        trackEvent("upload_syllabus", { file_name: file.name, file_type: fileType });
        formData.append('files', file);
    }

    try {
        status.textContent = 'Analyzing your syllabi...';

        const response = await fetch('/api/analyze', {
            method: 'POST',
            body: formData
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Analysis failed');
        }

        const data = await response.json();

        data.courses.forEach(course => {
            calendarData.push(course.ics_file);

            const assignments = course.assignments || [];
            const exams = course.exams || [];
            const others = course.others || [];
            const prepEvents = course.prep_events || [];

            const total = assignments.length + exams.length + others.length;
            trackEvent("parse_success", {
                total_items: total,
                assignment_count: assignments.length,
                exam_count: exams.length,
                other_count: others.length,
                prep_count: prepEvents.length
            });
            status.textContent = `Found ${total} important dates`;

            let html = `<h2>${course.course_name}</h2>`;

            if (assignments.length > 0) {
                html += '<h3>📚 Assignments</h3>';
                assignments.forEach(item => {
                    html += `<div class="event"><strong>${item.title}</strong> — ${formatDate(item.date)}<br><small>${item.description || ''}</small></div>`;
                });
            }

            if (exams.length > 0) {
                html += '<h3>📝 Exams</h3>';
                exams.forEach(item => {
                    html += `<div class="event"><strong>${item.title}</strong> — ${formatDate(item.date)}<br><small>${item.description || ''}</small></div>`;
                });
            }

            if (others.length > 0) {
                html += '<h3>📌 Important Deadlines</h3>';
                others.forEach(item => {
                    html += `<div class="event"><strong>${item.title}</strong> — ${formatDate(item.date)}<br><small>${item.description || ''}</small></div>`;
                });
            }

            if (prepEvents.length > 0) {
                html += '<h3>Prep Events</h3>';
                prepEvents.forEach(item => {
                    html += `<div class="event"><strong>${item.title}</strong> — ${formatDate(item.date)}</div>`;
                });
            }

            results.innerHTML += html;
        });
        results.innerHTML += `
            <div class="disclaimer">
                    <strong>AI can make mistakes.</strong><br>
                    Always double-check these dates against your official syllabus.
            </div>`;

        document.getElementById('downloadBtn').style.display = 'block';
        document.getElementById('uploadAnotherBtn').style.display = 'block';

    } catch (error) {
        status.textContent = 'Error: ' + error.message;
        trackEvent("parse_error", { message: error.message });
        console.error(error);
    } finally {
        btn.disabled = false;
    }
}

        function downloadCalendar() {
            if (!calendarData) return;

            trackEvent("download_calendar", {
                format: "ics"
            });
            const blob = new Blob([calendarData], { type: 'text/calendar' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'syllabus_calendar.ics';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
